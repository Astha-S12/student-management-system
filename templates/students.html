<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0b0f19;
            color: white;
        }

        .card-dark {
            background: #121a2a;
            border: 1px solid #1f2a44;
            transition: 0.3s;
        }

        .card-dark:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(0, 140, 255, 0.25);
        }

        .form-control {
            background: #0f172a;
            border: 1px solid #1f2a44;
            color: white;
        }

        .form-control:focus {
            background: #0f172a;
            color: white;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Student SaaS</a>
    <div>
      <a class="btn btn-outline-light btn-sm" href="/">Home</a>
      <a class="btn btn-outline-light btn-sm" href="/students">Dashboard</a>
      <a class="btn btn-outline-light btn-sm" href="/about">About</a>
    </div>
  </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-3">Add Student</h2>

    <form method="POST" class="row g-2">
        <div class="col-md-5">
            <input type="text" name="name" class="form-control" placeholder="Name" required>
        </div>

        <div class="col-md-5">
            <input type="email" name="email" class="form-control" placeholder="Email" required>
        </div>

        <div class="col-md-2">
            <button class="btn btn-primary w-100">Add</button>
        </div>
    </form>

    <hr class="text-secondary">

    <h3 class="mt-3">Student Cards</h3>

    <div class="row mt-3">

        {% for student in students %}
        <div class="col-md-4 mb-3">

            <div class="card card-dark p-3">

                <h5>{{ student.name }}</h5>
                <p class="text-secondary">{{ student.email }}</p>

                <div class="d-flex justify-content-between">
                    <span class="badge bg-primary">ID: {{ student.id }}</span>

                    <a href="/delete/{{ student.id }}" class="btn btn-danger btn-sm">
                        Delete
                    </a>
                </div>

            </div>

        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
